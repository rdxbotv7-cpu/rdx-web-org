<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commands - RDX Bot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ============================================
           CSS VARIABLES & RESET
           ============================================ */
        :root {
            --primary-color: #1877F2;
            --primary-hover: #166FE5;
            --secondary-color: #42b72a;
            --accent-color: #f02849;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --purple-color: #8b5cf6;
            --dark-bg: #0a0a1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--dark-bg);
            background-image:
                radial-gradient(ellipse at top left, rgba(99, 102, 241, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at top right, rgba(6, 182, 212, 0.1) 0%, transparent 40%),
                linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 100%);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* ============================================
           HEADER STYLES
           ============================================ */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
        }

        .logo-text {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo i {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.8rem;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a:hover,
        nav a.active {
            color: var(--text-primary);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transition: width 0.3s ease;
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main-content {
            padding: 8rem 2rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            text-align: center;
            margin-bottom: 1rem;
        }

        .page-title h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--purple-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .commands-count {
            text-align: center;
            margin-bottom: 2rem;
        }

        .count-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            font-size: 1rem;
            color: var(--purple-color);
        }

        /* ============================================
           SEARCH BAR
           ============================================ */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(24, 119, 242, 0.15);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        /* ============================================
           CATEGORY FILTER
           ============================================ */
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--purple-color));
            border-color: transparent;
            color: white;
        }

        /* ============================================
           COMMANDS GRID
           ============================================ */
        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .command-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .command-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 20px 40px rgba(24, 119, 242, 0.2);
        }

        /* Glowing effect when clicked */
        .command-card.clicked {
            animation: glowPulse 0.6s ease;
            border-color: var(--success-color);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.5), 0 20px 40px rgba(24, 119, 242, 0.3);
        }

        @keyframes glowPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(16, 185, 129, 0);
            }

            50% {
                transform: scale(1.02);
                box-shadow: 0 0 40px rgba(16, 185, 129, 0.7), 0 20px 40px rgba(24, 119, 242, 0.3);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(16, 185, 129, 0.5), 0 20px 40px rgba(24, 119, 242, 0.3);
            }
        }

        /* Command Date Badge */
        .command-date {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: rgba(24, 119, 242, 0.15);
            border: 1px solid rgba(24, 119, 242, 0.3);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--primary-color);
            font-weight: 500;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.5s ease;
        }

        .command-card:hover .command-date {
            opacity: 1;
            transform: translateY(0);
        }

        .command-date i {
            font-size: 0.7rem;
        }

        .command-date.animate {
            animation: fadeInSlide 0.5s ease forwards;
        }

        @keyframes fadeInSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .command-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .command-icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.5rem;
        }

        .command-icon.blue {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        }

        .command-icon.green {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .command-icon.purple {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
        }

        .command-icon.red {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .command-icon.orange {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .command-icon.pink {
            background: linear-gradient(135deg, #ec4899, #db2777);
        }

        .command-info h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .command-info .category {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .command-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .command-usage {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--success-color);
            margin-bottom: 1rem;
        }

        .command-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .premium-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--warning-color);
        }

        .command-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-copy {
            background: rgba(24, 119, 242, 0.2);
            color: var(--primary-color);
        }

        .btn-copy:hover {
            background: var(--primary-color);
            color: white;
        }

        .btn-download {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }

        .btn-download:hover {
            background: var(--success-color);
            color: white;
        }

        /* ============================================
           COMMAND CODE MODAL
           ============================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--dark-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            max-height: 80vh;
            overflow: hidden;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        .modal-body {
            padding: 1.5rem;
            max-height: 60vh;
            overflow-y: auto;
        }

        .code-container {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--glass-border);
        }

        .code-header span {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .code-actions {
            display: flex;
            gap: 0.5rem;
        }

        .code-content {
            padding: 1.5rem;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #e2e8f0;
            white-space: pre;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            padding: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }

        /* ============================================
           LOADING & ERROR STATES
           ============================================ */
        .loading {
            text-align: center;
            padding: 4rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--glass-border);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            text-align: center;
            padding: 4rem;
            color: var(--accent-color);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        /* ============================================
           NOTIFICATION
           ============================================ */
        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            background: var(--success-color);
            color: white;
            border-radius: 12px;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 3000;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 768px) {
            header {
                padding: 1rem;
            }

            nav {
                display: none;
            }

            .main-content {
                padding: 6rem 1rem 2rem;
            }

            .page-title h1 {
                font-size: 2rem;
            }

            .commands-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                max-height: 90vh;
            }
        }

        /* ============================================
           SCROLLBAR STYLES
           ============================================ */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <a href="../index.html" class="logo">
            <i class="fab fa-facebook-messenger"></i>
            <span class="logo-text">RDX Bot</span>
        </a>
        <nav>
            <a href="../index.html">Home</a>
            <a href="../features.html">Features</a>
            <a href="index.html" class="active">Commands</a>
            <a href="../about.html">About</a>
            <a href="../contact.html">Contact</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Page Title -->
        <div class="page-title">
            <h1><i class="fas fa-terminal"></i> Bot Commands</h1>
            <p>View all available commands for RDX Bot</p>
        </div>

        <!-- Commands Count -->
        <div class="commands-count">
            <span class="count-badge">
                <i class="fas fa-list"></i> <span id="totalCommands">0</span> Commands Available
            </span>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search commands..." autocomplete="off">
            </div>
        </div>

        <!-- Category Filter -->
        <div class="category-filter">
            <button class="filter-btn active" data-category="all">All Commands</button>
            <button class="filter-btn" data-category="moderation">Moderation</button>
            <button class="filter-btn" data-category="utility">Utility</button>
            <button class="filter-btn" data-category="fun">Fun</button>
            <button class="filter-btn" data-category="admin">Admin</button>
            <button class="filter-btn" data-category="music">Music</button>
        </div>

        <!-- Commands Grid -->
        <div class="commands-grid" id="commandsGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading commands...</p>
            </div>
        </div>
    </main>

    <!-- Command Code Modal -->
    <div class="modal-overlay" id="codeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalCommandName">Command Name</h2>
                <button class="modal-close" onclick="playButtonSound(); closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="code-container">
                    <div class="code-header">
                        <span id="modalFileName">filename.js</span>
                        <div class="code-actions">
                            <button class="action-btn btn-copy" onclick="playButtonSound(); copyCode()">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                            <button class="action-btn btn-download" onclick="playButtonSound(); downloadCode()">
                                <i class="fas fa-download"></i> Download
                            </button>
                        </div>
                    </div>
                    <div class="code-content" id="codeContent"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="action-btn btn-copy" onclick="playButtonSound(); copyCode()">
                    <i class="fas fa-copy"></i> Copy Code
                </button>
                <button class="action-btn btn-download" onclick="playButtonSound(); downloadCode()">
                    <i class="fas fa-download"></i> Download
                </button>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i> <span id="notificationText">Success!</span>
    </div>

    <script>
        // ============================================
        // SOUND EFFECTS
        // ============================================
        const buttonSound = new Audio('../sound effects/buttons.mpeg');
        const loginSound = new Audio('../sound effects/login.mpeg');

        function playButtonSound() {
            buttonSound.currentTime = 0;
            buttonSound.volume = 0.5;
            buttonSound.play().catch(e => console.log('Sound play failed:', e));
        }

        function playLoginSound() {
            loginSound.currentTime = 0;
            loginSound.volume = 0.5;
            loginSound.play().catch(e => console.log('Sound play failed:', e));
        }

        // Global variables
        let allCommands = [];
        let currentCommand = null;
        let currentFilter = 'all';

        // Fetch commands from API
        async function fetchCommands() {
            try {
                const response = await fetch('/api/commands');
                const data = await response.json();

                if (data.success) {
                    allCommands = data.commands;
                    displayCommands(allCommands);
                    document.getElementById('totalCommands').textContent = data.count;
                } else {
                    showError('Failed to load commands');
                }
            } catch (error) {
                console.error('Error fetching commands:', error);
                showError('Error connecting to server');
            }
        }

        // Display commands in grid
        function displayCommands(commands) {
            const grid = document.getElementById('commandsGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            // Filter by category
            let filteredCommands = commands;
            if (currentFilter !== 'all') {
                filteredCommands = commands.filter(cmd =>
                    cmd.category && cmd.category.toLowerCase() === currentFilter
                );
            }

            // Filter by search term
            if (searchTerm) {
                filteredCommands = filteredCommands.filter(cmd =>
                    (cmd.name && cmd.name.toLowerCase().includes(searchTerm)) ||
                    (cmd.description && cmd.description.toLowerCase().includes(searchTerm)) ||
                    (cmd.category && cmd.category.toLowerCase().includes(searchTerm)) ||
                    (cmd.usage && cmd.usage.toLowerCase().includes(searchTerm))
                );
            }

            if (filteredCommands.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                        <p>No commands found in this category</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredCommands.map((cmd, index) => `
                <div class="command-card" onclick="openCommandModal('${cmd.file}', event)">
                    <div class="command-date">
                        <i class="fas fa-calendar-alt"></i>
                        <span>${formatDate(cmd.createdAt)}</span>
                    </div>
                    <div class="command-header">
                        <div class="command-icon ${cmd.color || 'blue'}">
                            <i class="fas fa-${cmd.icon || 'terminal'}"></i>
                        </div>
                        <div class="command-info">
                            <h3>${cmd.name}</h3>
                            <span class="category">${cmd.category || 'utility'}</span>
                        </div>
                    </div>
                    <p class="command-description">${cmd.description || 'No description available'}</p>
                    <div class="command-usage">
                        <i class="fas fa-chevron-right"></i> ${cmd.usage || '/' + cmd.name}
                    </div>
                    <div class="command-meta">
                        ${cmd.premium ? '<span class="premium-badge"><i class="fas fa-crown"></i> Premium</span>' : '<span style="color: var(--text-secondary); font-size: 0.85rem;">Free</span>'}
                        <div class="command-actions" onclick="event.stopPropagation()">
                            <button class="action-btn btn-copy" onclick="copyCommandName('${cmd.name}')">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button class="action-btn btn-download" onclick="downloadCommandFile('${cmd.file}')">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Format date helper function
        function formatDate(dateString) {
            if (!dateString) return 'Unknown';

            try {
                const date = new Date(dateString);
                const now = new Date();
                const diffTime = now - date;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays === 0) {
                    return 'Today';
                } else if (diffDays === 1) {
                    return 'Yesterday';
                } else if (diffDays < 7) {
                    return diffDays + ' days ago';
                } else if (diffDays < 30) {
                    const weeks = Math.floor(diffDays / 7);
                    return weeks + (weeks === 1 ? ' week ago' : ' weeks ago');
                } else if (diffDays < 365) {
                    const months = Math.floor(diffDays / 30);
                    return months + (months === 1 ? ' month ago' : ' months ago');
                } else {
                    const years = Math.floor(diffDays / 365);
                    return years + (years === 1 ? ' year ago' : ' years ago');
                }
            } catch (e) {
                return 'Unknown';
            }
        }

        // Open command modal with code
        async function openCommandModal(filename, event) {
            // Add glowing effect to the clicked card
            const card = event.currentTarget;
            card.classList.add('clicked');

            // Remove the class after animation completes
            setTimeout(() => {
                card.classList.remove('clicked');
            }, 600);

            try {
                const response = await fetch(`/api/command/${filename}`);
                const data = await response.json();

                if (data.success) {
                    currentCommand = data;
                    document.getElementById('modalCommandName').textContent = data.name;
                    document.getElementById('modalFileName').textContent = data.file;
                    document.getElementById('codeContent').textContent = data.code;
                    document.getElementById('codeModal').classList.add('active');
                } else {
                    showNotification('Failed to load command code', 'error');
                }
            } catch (error) {
                console.error('Error loading command:', error);
                showNotification('Error loading command', 'error');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('codeModal').classList.remove('active');
            currentCommand = null;
        }

        // Copy code from modal
        async function copyCode() {
            if (!currentCommand) return;

            try {
                await navigator.clipboard.writeText(currentCommand.code);
                showNotification('Code copied to clipboard!');
            } catch (err) {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = currentCommand.code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showNotification('Code copied to clipboard!');
            }
        }

        // Download code from modal
        function downloadCode() {
            if (!currentCommand) return;

            const blob = new Blob([currentCommand.code], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentCommand.file;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showNotification('Download started!');
        }

        // Copy command name
        async function copyCommandName(name) {
            playButtonSound();

            try {
                await navigator.clipboard.writeText(name);
                showNotification('Command name copied!');
            } catch (err) {
                showNotification('Failed to copy', 'error');
            }
        }

        // Download command file directly
        function downloadCommandFile(filename) {
            playButtonSound();

            const a = document.createElement('a');
            a.href = `/commands/${filename}`;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showNotification('Download started!');
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const text = document.getElementById('notificationText');

            text.textContent = message;
            notification.style.background = type === 'error' ? 'var(--accent-color)' : 'var(--success-color)';
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Show error
        function showError(message) {
            document.getElementById('commandsGrid').innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                    <p>${message}</p>
                </div>
            `;
        }

        // Category filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                playButtonSound();

                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                filterAndDisplayCommands(searchTerm, currentFilter);
            });
        });

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            filterAndDisplayCommands(searchTerm, currentFilter);
        });

        function filterAndDisplayCommands(searchTerm, category) {
            let filtered = allCommands;

            // Filter by category
            if (category !== 'all') {
                filtered = filtered.filter(cmd =>
                    cmd.category && cmd.category.toLowerCase() === category
                );
            }

            // Filter by search term
            if (searchTerm) {
                filtered = filtered.filter(cmd =>
                    cmd.name.toLowerCase().includes(searchTerm) ||
                    cmd.description.toLowerCase().includes(searchTerm) ||
                    cmd.category.toLowerCase().includes(searchTerm) ||
                    cmd.usage.toLowerCase().includes(searchTerm)
                );
            }

            displayFilteredCommands(filtered);
        }

        function displayFilteredCommands(commands) {
            const grid = document.getElementById('commandsGrid');

            if (commands.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                        <p>No commands found matching your search</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = commands.map((cmd, index) => `
                <div class="command-card" onclick="openCommandModal('${cmd.file}')">
                    <div class="command-header">
                        <div class="command-icon ${cmd.color || 'blue'}">
                            <i class="fas fa-${cmd.icon || 'terminal'}"></i>
                        </div>
                        <div class="command-info">
                            <h3>${cmd.name}</h3>
                            <span class="category">${cmd.category || 'utility'}</span>
                        </div>
                    </div>
                    <p class="command-description">${cmd.description || 'No description available'}</p>
                    <div class="command-usage">
                        <i class="fas fa-chevron-right"></i> ${cmd.usage || '/' + cmd.name}
                    </div>
                    <div class="command-meta">
                        ${cmd.premium ? '<span class="premium-badge"><i class="fas fa-crown"></i> Premium</span>' : '<span style="color: var(--text-secondary); font-size: 0.85rem;">Free</span>'}
                        <div class="command-actions" onclick="event.stopPropagation()">
                            <button class="action-btn btn-copy" onclick="copyCommandName('${cmd.name}')">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button class="action-btn btn-download" onclick="downloadCommandFile('${cmd.file}')">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Close modal on outside click
        document.getElementById('codeModal').addEventListener('click', (e) => {
            if (e.target.id === 'codeModal') {
                closeModal();
            }
        });

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize
        fetchCommands();
    </script>
</body>

</html>
